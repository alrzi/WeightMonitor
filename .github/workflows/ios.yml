name: CI

on:
  push:
    branches: [ "main", "alrzi-patch-1" ]
  pull_request:
    branches: [ "main", "alrzi-patch-1" ]

jobs:
  check:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26.3       
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Run CI
        run: mise run check
