name: CI

on:
  push:
    branches: [ "main", "alrzi-patch-1" ]
  pull_request:
    branches: [ "main", "alrzi-patch-1" ]

jobs:
  check:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true
     
      # 1. Читаем версию из файла в переменную окружения
      - name: Read Xcode version
        id: xcode_version
        run: echo "VERSION=$(cat .xcode-version)" >> $GITHUB_OUTPUT

      # 2. Передаем эту переменную в setup-xcode
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ steps.xcode_version.outputs.VERSION }}

      - name: Run CI
        run: mise run check
