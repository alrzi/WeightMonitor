name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          # Включает кэширование установленных инструментов
          cache: true
          # Позволяет mise устанавливать зависимости без лишних вопросов
          install: true

      - name: Run CI check
        run: mise run check
