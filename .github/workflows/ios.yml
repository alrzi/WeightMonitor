name: CI

on:
  pull_request:
    branches: [ main ]          # runs on PRs targeting main
  push:
    branches: [ main ]          # runs on direct pushes to main (e.g., after merge)

jobs:
  build-test-lint:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Xcode
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app   # adjust version as needed

      # Cache SwiftPM dependencies (if you use Swift Package Manager)
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            .build
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      # Install SwiftLint (linting tool)
      - name: Install SwiftLint
        run: brew install swiftlint

      # Run SwiftLint
      - name: Lint code
        run: swiftlint lint --strict

      # Build and run unit tests
      - name: Run tests
        run: |
          xcodebuild clean test \
            -project YourProject.xcodeproj \
            -scheme YourScheme \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -enableCodeCoverage YES

      # (Optional) Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
