name: CI

on:
  push:
    branches: [ "main", "alrzi-patch-1" ]
  pull_request:
    branches: [ "main", "alrzi-patch-1" ]

jobs:
  check:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true
     
      # 2. Выбираем Xcode, читая версию прямо из файла .xcode-version
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: from-file # Автоматически найдет .xcode-version

      - name: Run CI
        run: mise run check
